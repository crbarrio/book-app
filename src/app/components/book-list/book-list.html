<h1 class="text-2xl font-semibold text-slate-800 text-center mb-6">Listado de libros</h1>


  @if (bookResource.isLoading()) {
  <p>Cargando...</p>
  } @else if (bookResource.error()) {
  <p>Error al cargar los libros</p>
  } @else {
    <div class="overflow-x-auto mb-10">
      <table class="min-w-full divide-y divide-slate-200 bg-white shadow-md rounded-lg">
        <thead class="bg-slate-100">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-700 uppercase tracking-wider">Título</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-700 uppercase tracking-wider">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-200">
          @for (book of bookResource.value(); track book.id) {
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap text-slate-800">{{ book.title }}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <a [routerLink]="['/books', book.id]" class="text-blue-600 hover:text-blue-700 hover:underline font-medium mr-2">Detalles</a>
              <a (click)="deleteBook(book.id)" class="text-red-600 hover:text-red-700 hover:underline font-medium mr-2">Borrar</a>
              <a (click)="openModal(book)" class="text-green-600 hover:text-green-700 hover:underline font-medium">Editar</a>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  }

<button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" (click)="openModal()">Añadir libro</button>

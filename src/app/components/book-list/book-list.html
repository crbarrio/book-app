<h1 class="text-2xl text-center mb-4">Listado de libros</h1>

<ul class="mb-4">
@for (book of bookService.getBooks(); track book.id) {
    <li>{{ book.title }} - <a [routerLink]="['/books', book.id]" class="underline text-blue-600 hover:text-blue-800 visited:text-purple-600">Detalles</a></li>
}
</ul>

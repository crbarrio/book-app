    <h1 class="text-2xl font-semibold text-slate-800 text-center mb-6">Listado de libros</h1>

<ul class="divide-y divide-slate-100">
  @for (book of bookService.getBooks(); track book.id) {
    <li class="flex items-center justify-between py-4 text-lg text-slate-700">
      <span>{{ book.title }}</span>
      <a [routerLink]="['/books', book.id]" class="text-blue-600 hover:text-blue-700 hover:underline">Detalles</a>
    </li>
  }
</ul>
